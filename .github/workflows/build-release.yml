name: Build e Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt
          pip install Pillow

      - name: Build executável
        run: python build_exe.py

      - name: Upload artefato (build)
        uses: actions/upload-artifact@v4
        with:
          name: SQLSysHub-Windows
          path: dist/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download artefato
        uses: actions/download-artifact@v4
        with:
          name: SQLSysHub-Windows
          path: dist/

      - name: Criar arquivo ZIP
        run: |
          cd dist
          zip -r ../SQLSysHub-${{ github.ref_name }}.zip .

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: SQLSysHub-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
