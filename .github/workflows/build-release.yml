name: Build e Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Instalar dependências de teste
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt
          pip install -r requirements_test.txt

      - name: Executar testes
        run: |
          pytest -m "not slow and not performance and not concurrency" `
            --ignore=tests/integration --ignore=tests/performance `
            --ignore=tests/unit/test_main_window.py `
            --ignore=tests/unit/test_sql_editor.py `
            --ignore=tests/unit/test_ui_components.py `
            --tb=short --no-header -q
        shell: powershell
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

  build:
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Instalar dependências de build
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Build executável
        run: python build_exe.py
        shell: powershell
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1

      - name: Criar arquivo ZIP
        run: Compress-Archive -Path dist/* -DestinationPath SQLSysHub-latest.zip
        shell: powershell

      - name: Upload artefato
        uses: actions/upload-artifact@v4
        with:
          name: SQLSysHub-Windows
          path: dist/
          retention-days: 30

      - name: Atualizar Release Latest
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Última Versão
          body: |
            🚀 Build automático mais recente do SQL SysHub

            📅 Atualizado em: ${{ github.event.head_commit.timestamp }}
            📝 Commit: ${{ github.sha }}

            **Download:** Baixe o arquivo `SQLSysHub-latest.zip` abaixo.
          files: SQLSysHub-latest.zip
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
